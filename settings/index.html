<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微信书摘 · 设置</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <header class="header">
      <h1>微信书摘 · 设置</h1>
      <p class="subtitle">管理你的笔记导入和展示规则</p>
    </header>

    <!-- ===== 从微信读书同步 ===== -->
    <section class="section" id="section-sync">
      <h2 class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        从微信读书同步
      </h2>
      <p class="section-desc">通过微信读书官方 API 自动获取你的所有笔记，无需手动导出 JSON。</p>

      <div class="sync-flow">
        <div class="sync-step">
          <span class="step-num">1</span>
          <span>前往微信读书获取 API Key</span>
          <a href="https://weread.qq.com/r/weread-skills" target="_blank" class="btn btn-small" id="btnOpenSkills">打开 →</a>
        </div>
        <div class="sync-step">
          <span class="step-num">2</span>
          <span>将 API Key 粘贴到下方</span>
          <input type="text" id="apiKeyInput" class="sync-input" placeholder="wrk-xxxxxxxx" spellcheck="false" />
        </div>
        <div class="sync-step">
          <span class="step-num">3</span>
          <span>点击同步，自动获取所有笔记</span>
          <button class="btn btn-primary" id="btnSync">开始同步</button>
        </div>
      </div>

      <div id="syncProgress" class="sync-progress" style="display:none;">
        <div class="sync-progress-bar">
          <div class="sync-progress-fill" id="syncProgressFill"></div>
        </div>
        <p class="sync-progress-text" id="syncProgressText">准备中...</p>
      </div>

      <div id="syncResult" class="import-result"></div>

      <p class="sync-hint">💡 API Key 仅保存在本地浏览器中，不会上传到任何服务器。</p>
    </section>

    <!-- ===== 排除书籍 ===== -->
    <section class="section" id="section-exclude">
      <h2 class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
        排除书籍
      </h2>
      <p class="section-desc">关闭开关，该书的笔记将不会出现在新标签页中。</p>

      <div id="bookList" class="book-list">
        <p class="no-data">还没有导入笔记，请先导入。</p>
      </div>
    </section>

    <!-- ===== 统计 ===== -->
    <section class="section" id="section-stats">
      <h2 class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        统计概览
      </h2>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><span class="stat-num" id="statTotal">0</span><span class="stat-label">总笔记数</span></div>
        <div class="stat-card"><span class="stat-num" id="statActive">0</span><span class="stat-label">展示中</span></div>
        <div class="stat-card"><span class="stat-num" id="statExcluded">0</span><span class="stat-label">已排除</span></div>
        <div class="stat-card"><span class="stat-num" id="statBooks">0</span><span class="stat-label">涉及书籍</span></div>
      </div>
    </section>

    <!-- ===== 清空数据 ===== -->
    <section class="section section-danger">
      <h2 class="section-title" style="color: var(--danger);">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        危险操作
      </h2>
      <p class="section-desc">清空所有导入的笔记数据。此操作不可撤销。</p>
      <button class="btn btn-danger-outline" id="btnClearAll">清空所有数据</button>
    </section>

    <!-- ===== Toast ===== -->
    <div id="toast" class="toast"></div>

  </div>

  <script src="settings.js"></script>
</body>
</html>
