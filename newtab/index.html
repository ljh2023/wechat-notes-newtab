<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新标签页</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== 加载状态 ========== -->
  <div id="state-loading" class="state active">
    <div class="spinner"></div>
    <p class="state-hint">加载笔记中...</p>
  </div>

  <!-- ========== 笔记展示 ========== -->
  <div id="state-display" class="state">
    <div class="state-scroll">
      <div class="card" id="card">
        <div class="card-quote-mark">"</div>
        <p class="card-content" id="noteContent"></p>
        <div class="card-source" id="noteSource"></div>
      </div>
      <div class="actions">
        <button class="btn" id="btnCopy" title="复制笔记">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          复制
        </button>
        <button class="btn" id="btnPrev" title="上一条">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          上一条
        </button>
        <button class="btn btn-primary" id="btnNext" title="下一条">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          下一条
        </button>
        <button class="btn btn-danger" id="btnDelete" title="删除此笔记">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          删除
        </button>
      </div>
    </div>
    <div class="footer-info" id="footerInfo"></div>
  </div>

  <!-- ========== 空状态 ========== -->
  <div id="state-empty" class="state">
    <div class="empty-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    <h2 class="empty-title">还没有笔记</h2>
    <p class="empty-desc">导入你的微信读书笔记，开始在新标签页中回顾它们。</p>
    <a href="#" class="btn btn-primary" id="goToSettings">去导入笔记 →</a>
  </div>

  <!-- ========== 全被排除状态 ========== -->
  <div id="state-empty-filtered" class="state">
    <div class="empty-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
    </div>
    <h2 class="empty-title">所有笔记已被排除</h2>
    <p class="empty-desc">当前导入的笔记所属的书籍已被全部排除。前往设置调整排除列表。</p>
    <a href="#" class="btn btn-primary" id="goToSettingsFiltered">调整设置 →</a>
  </div>

  <!-- ========== Toast 通知 ========== -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
